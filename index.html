  <style>
    html, body { height: 100%; margin: 0; }
    * { box-sizing: border-box; }

    .font-heading { font-family: 'Baloo 2', cursive; }
    .font-body { font-family: 'Quicksand', sans-serif; }

    .comic-bg {
      background-color: #fef9f0;
      background-image:
        radial-gradient(circle, #f0c6d8 1px, transparent 1px),
        radial-gradient(circle, #c4a8e0 0.8px, transparent 0.8px);
      background-size: 28px 28px, 42px 42px;
      background-position: 0 0, 14px 14px;
    }

    .comic-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: radial-gradient(circle, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 4px 4px;
      pointer-events: none;
      z-index: 0;
    }

    .cat-paw { display: inline-block; transition: transform 0.2s; }
    .cat-paw:hover { transform: scale(1.2) rotate(-10deg); }

    .category-btn {
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      border: 3px solid transparent;
      position: relative;
      overflow: hidden;
    }
    .category-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    .category-btn:hover::before { left: 100%; }
    .category-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }
    .category-btn.active {
      border-color: #e84393;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(232,67,147,0.3);
    }

    .product-card {
      transition: all 0.2s ease;
      border: 2px solid #f0e6f6;
    }
    .product-card:hover {
      border-color: #d63384;
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(214,51,132,0.15);
    }

    .qty-btn { transition: all 0.15s ease; }
    .qty-btn:hover { transform: scale(1.1); }
    .qty-btn:active { transform: scale(0.95); }

    .cart-badge {
      animation: popIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    @keyframes popIn {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }

    .slide-down { animation: slideDown 0.35s ease-out; }
    @keyframes slideDown {
      0% { opacity: 0; transform: translateY(-15px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .whatsapp-btn {
      background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(37,211,102,0.4);
    }
    .whatsapp-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(37,211,102,0.5);
    }

    .stamp-border { border: 3px dashed #e84393; border-radius: 12px; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #fef9f0; }
    ::-webkit-scrollbar-thumb { background: #d4a5c9; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #c084b6; }

    .extras-check { accent-color: #e84393; }

    .floating-cart {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 50;
      transition: all 0.3s ease;
    }
    .floating-cart:hover { transform: scale(1.05); }

    .toast-msg {
      animation: toastIn 0.4s ease-out, toastOut 0.3s ease-in 2s forwards;
    }
    @keyframes toastIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastOut {
      0% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-10px); }
    }

    .subcategory-header::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 40px;
      height: 3px;
      background: linear-gradient(90deg, #e84393, #a855f7);
      border-radius: 2px;
    }
  </style>

    function applyConfig(config) {
      const title = config.brand_title || defaultConfig.brand_title;
      const subtitle = config.brand_subtitle || defaultConfig.brand_subtitle;
      const btnText = config.whatsapp_button_text || defaultConfig.whatsapp_button_text;

      const primaryColor = config.primary_action_color || defaultConfig.primary_action_color;
      const secondaryColor = config.secondary_action_color || defaultConfig.secondary_action_color;
      const fontFamily = config.font_family || "'Baloo 2', cursive";
      const fontSize = config.font_size || 16;

      if (document.getElementById('brand-title')) document.getElementById('brand-title').textContent = title;
      if (document.getElementById('brand-subtitle')) document.getElementById('brand-subtitle').textContent = subtitle;
      if (document.getElementById('whatsapp-btn-text')) document.getElementById('whatsapp-btn-text').textContent = btnText;

      const wrapper = document.getElementById('app-wrapper');
      if (wrapper) wrapper.style.backgroundColor = bgColor;

      document.querySelectorAll('.bg-white\\/95, .bg-white\\/90').forEach(el => {
        el.style.backgroundColor = surfColor + 'f2';
      });

      const headingFont = `${fontFamily}, 'Baloo 2', cursive`;
      const bodyFont = `${fontFamily}, 'Quicksand', sans-serif`;
      document.querySelectorAll('.font-heading').forEach(el => el.style.fontFamily = headingFont);
      document.querySelectorAll('.font-body, body').forEach(el => el.style.fontFamily = bodyFont);

      const base = fontSize;
      document.querySelectorAll('h1').forEach(el => el.style.fontSize = `${base * 1.8}px`);
      document.querySelectorAll('h2').forEach(el => el.style.fontSize = `${base * 1.4}px`);
      document.querySelectorAll('h3').forEach(el => el.style.fontSize = `${base * 1.15}px`);
      document.querySelectorAll('p, span, button, label, a').forEach(el => {
        if (!el.closest('h1') && !el.closest('h2') && !el.closest('h3')) {
          el.style.fontSize = `${base}px`;
        }
      });
    }

    // ==================== ELEMENT SDK ====================
    if (window.elementSdk && window.elementSdk.init) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => { applyConfig(config); },
        mapToCapabilities: (config) => ({
          recolorables: [
            { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
            { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
            { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
            { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
            { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
          ],
          borderables: [],
          fontEditable: {
            get: () => config.font_family || defaultConfig.font_family || "'Baloo 2'",
            set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
          },
          fontSizeable: {
            get: () => config.font_size || defaultConfig.font_size || 16,
            set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
          }
        }),
        mapToEditPanelValues: (config) => new Map([
          ['brand_title', config.brand_title || defaultConfig.brand_title],
          ['brand_subtitle', config.brand_subtitle || defaultConfig.brand_subtitle],
          ['whatsapp_button_text', config.whatsapp_button_text || defaultConfig.whatsapp_button_text]
        ])
      });
    }

    // ==================== CARGAR PRECIOS ====================
    async function loadPrices() {
      try {
        const response = await fetch('./precios.json');
        if (!response.ok) throw new Error('No se pudo cargar precios.json');
        prices = await response.json();
        console.log('Precios cargados correctamente');
      } catch (err) {
        console.warn('No se pudieron cargar los precios:', err.message);
        showToast(' No se cargó precios.json (precios en $0)');
      }
    }

    // ==================== CALCULAR TOTAL ====================
    function calculateTotal() {
      let total = 0;
      Object.entries(cart).forEach(([key, item]) => {
        if (item.qty <= 0) return;
        const [catId, subName, prodName] = key.split('|');
        const basePrice = prices?.[catId]?.[subName]?.[prodName] || 0;
        let extraCost = 0;
        if (item.extras.has('extra-estampado')) extraCost += 3000;
        if (item.extras.has('extra-imantado')) extraCost += 800;
        total += (basePrice + extraCost) * item.qty;
      });
      return total;
    }

    // ==================== RENDER CATEGORIES ====================
    function renderCategories() {
      const grid = document.getElementById('category-grid');
      if (!grid) {
        console.error('No se encontró el elemento #category-grid');
        return;
      }
      grid.innerHTML = '';
      CATEGORIES.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `category-btn bg-gradient-to-br ${cat.gradient} text-white rounded-2xl p-4 md:p-5 flex flex-col items-center gap-2 shadow-lg`;
        btn.dataset.catId = cat.id;
        btn.innerHTML = `
          <span class="text-3xl md:text-4xl">${cat.icon}</span>
          <span class="font-heading font-bold text-sm md:text-base text-center leading-tight">${cat.name}</span>
        `;
        btn.addEventListener('click', () => selectCategory(cat.id));
        grid.appendChild(btn);
      });
      lucide.createIcons();
    }

    // ==================== SELECT CATEGORY ====================
    function selectCategory(catId) {
      activeCategoryId = catId;
      const cat = CATEGORIES.find(c => c.id === catId);
      if (!cat) {
        console.warn('Categoría no encontrada:', catId);
        return;
      }

      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.catId === catId);
      });

      const section = document.getElementById('products-section');
      if (section) section.classList.remove('hidden');

      const titleEl = document.getElementById('category-title');
      if (titleEl) titleEl.innerHTML = `${cat.icon} ${cat.name}`;

      const container = document.getElementById('products-container');
      if (!container) return;
      container.innerHTML = '';

      if (cat.extras && cat.extras.length > 0) {
        const extrasDiv = document.createElement('div');
        extrasDiv.className = 'bg-yellow-50 border-2 border-yellow-200 rounded-xl p-3 mb-4 slide-down';
        extrasDiv.innerHTML = `
          <p class="font-heading font-bold text-yellow-700 text-sm flex items-center gap-2 mb-1">
            <i data-lucide="info" style="width:16px;height:16px;"></i> Extras disponibles
          </p>
          <p class="text-yellow-600 text-xs">${cat.extras.map(e => e.label).join(' · ')}</p>
        `;
        container.appendChild(extrasDiv);
      }

      cat.subcategories.forEach((sub, index) => {
        const subDiv = document.createElement('div');
        subDiv.className = 'mb-5 slide-down';
        subDiv.style.animationDelay = `${index * 0.08}s`;

        const subHeader = document.createElement('h3');
        subHeader.className = 'subcategory-header font-heading font-bold text-purple-600 text-lg mb-3 pb-1';
        subHeader.textContent = sub.name;
        subDiv.appendChild(subHeader);

        const prodGrid = document.createElement('div');
        prodGrid.className = 'grid grid-cols-1 sm:grid-cols-2 gap-2';

        sub.products.forEach(prod => {
          const key = `${catId}|${sub.name}|${prod}`;
          const qty = cart[key]?.qty || 0;
          const extras = cart[key]?.extras || new Set();
          const image = cart[key]?.image || null;

          const card = document.createElement('div');
          card.className = 'product-card bg-white rounded-xl p-3 flex flex-col gap-2';
          card.dataset.key = key;

          let extrasHTML = '';
          if (cat.extras) {
            cat.extras.forEach(ex => {
              const checked = extras.has(ex.id) ? 'checked' : '';
              extrasHTML += `
                <label class="flex items-center gap-1 cursor-pointer">
                  <input type="checkbox" class="extras-check w-4 h-4 rounded" data-extra-id="${ex.id}" data-key="${key}" ${checked}>
                  <span class="text-xs text-gray-500">${ex.label}</span>
                </label>
              `;
            });
          }

          let imageHTML = '';
          if (image) {
            imageHTML = `
              <div class="relative w-full h-20 bg-gray-100 rounded-lg overflow-hidden mb-1">
                <img src="${image}" alt="Referencia" class="w-full h-full object-cover" loading="lazy">
                <button class="absolute top-1 right-1 bg-red-500 text-white w-6 h-6 rounded-full flex items-center justify-center hover:bg-red-600 text-xs font-bold" data-remove-image="${key}">×</button>
              </div>
            `;
          }

          // Solo calculamos talles y colores si es la categoría Remeras
          let tallesHTML = '';
          let colorFieldHTML = '';

          if (cat.id === 'remeras') {
            const esPoliester = prod.toLowerCase().includes('poliéster') || prod.toLowerCase().includes('poliester');
            const esRanglan   = prod.toLowerCase().includes('ranglan');
            const esNinos     = sub.name.toLowerCase().includes('niñ') || sub.name.toLowerCase().includes('nino');

            // Talleres
            if (esNinos) {
              tallesHTML = cat.sizes.ninos.map(s => `<option value="${s}">${s}</option>`).join('');
            } else {
              const comunes   = cat.sizes.adultos.comunes.map(s => `<option value="${s}">${s}</option>`).join('');
              const especiales = cat.sizes.adultos.especiales.map(s => `<option value="${s}">${s} (+costo extra)</option>`).join('');
              tallesHTML = `
                ${comunes}
                <optgroup label="Talles especiales – consultar costo adicional">
                  ${especiales}
                </optgroup>
              `;
            }

            // Colores
            let colorOptions = cat.standardColors;
            let colorLabel   = 'Color';

            if (esRanglan) {
              colorOptions = cat.ranglanColors;
              colorLabel   = 'Combinación de colores';
            }

            const colorOptionsHTML = colorOptions.map(c => 
              `<option value="${c.value}">${c.label}</option>`
            ).join('');

            colorFieldHTML = `
              <div>
                <label class="block text-gray-600 font-medium mb-1">${colorLabel}</label>
                <select class="color-select w-full border border-gray-300 rounded-md px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-purple-400" data-key="${key}">
                  <option value="">Elegir ${colorLabel.toLowerCase()}</option>
                  ${colorOptionsHTML}
                </select>
              </div>
            `;
          }

          card.innerHTML = `
            <div class="flex items-center justify-between gap-2">
              <div class="flex-1 min-w-0">
                <p class="font-semibold text-gray-700 text-sm truncate">${prod}</p>
                ${extrasHTML}
                
                ${cat.id === 'remeras' ? `
                  <div class="mt-3 grid grid-cols-2 gap-3 text-xs">
                    <div>
                      <label class="block text-gray-600 font-medium mb-1">Talle</label>
                      <select class="talle-select w-full border border-gray-300 rounded-md px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-purple-400" data-key="${key}">
                        <option value="">Elegir talle</option>
                        ${tallesHTML}
                      </select>
                    </div>
                    ${colorFieldHTML}
                  </div>
                ` : ''}
              </div>
              <div class="flex items-center gap-1 shrink-0">
                <button class="qty-btn w-8 h-8 rounded-full bg-pink-100 text-pink-600 font-bold flex items-center justify-center hover:bg-pink-200 text-sm" data-action="dec" data-key="${key}">−</button>
                <span class="w-8 text-center font-heading font-bold text-gray-700 text-sm" data-qty-display="${key}">${qty}</span>
                <button class="qty-btn w-8 h-8 rounded-full bg-pink-500 text-white font-bold flex items-center justify-center hover:bg-pink-600 text-sm" data-action="inc" data-key="${key}" data-cat-id="${catId}" data-sub-name="${sub.name}" data-prod-name="${prod}">+</button>
              </div>
            </div>
            ${imageHTML}
            <label class="flex items-center justify-center gap-1 w-full px-2 py-1.5 bg-purple-50 hover:bg-purple-100 rounded-lg cursor-pointer transition-colors border border-purple-200 text-xs font-medium text-purple-600">
              <i data-lucide="image-plus" style="width:14px;height:14px;"></i>
              <span class="hidden sm:inline">Agregar referencia</span>
              <span class="sm:hidden">Foto</span>
              <input type="file" class="image-input hidden" accept="image/*" data-key="${key}">
            </label>
          `;

          prodGrid.appendChild(card);
        });

        subDiv.appendChild(prodGrid);
        container.appendChild(subDiv);
      });

      lucide.createIcons();
      section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ==================== CART LOGIC ====================
    function updateQty(key, delta, catId, subName, prodName) {
      if (!cart[key]) {
        if (delta < 0) return;
        cart[key] = { qty: 0, extras: new Set(), image: null, catName: CATEGORIES.find(c => c.id === catId)?.name || '', subName, productName: prodName };
      }
      cart[key].qty = Math.max(0, cart[key].qty + delta);
      if (cart[key].qty === 0) delete cart[key];

      document.querySelectorAll(`[data-qty-display="${key}"]`).forEach(d => {
        d.textContent = cart[key]?.qty || 0;
      });

      if (delta > 0) showToast(` ${prodName} agregado`);
      updateCartUI();
    }

    function toggleExtra(key, extraId) {
      if (!cart[key]) return;
      if (cart[key].extras.has(extraId)) {
        cart[key].extras.delete(extraId);
      } else {
        cart[key].extras.add(extraId);
      }
      updateCartUI();
    }

    function handleImageUpload(key, file) {
      if (!file || !file.type.startsWith('image/')) {
        showToast(' Solo imágenes');
        return;
      }
      if (file.size > 5 * 1024 * 1024) {
        showToast(' Imagen muy grande (máx 5MB)');
        return;
      }

      const reader = new FileReader();
      reader.onload = (e) => {
        if (!cart[key]) {
          const [catId, subName, prodName] = key.split('|');
          cart[key] = { qty: 1, extras: new Set(), image: null, catName: CATEGORIES.find(c => c.id === catId)?.name || '', subName, productName: prodName };
          document.querySelectorAll(`[data-qty-display="${key}"]`).forEach(d => d.textContent = '1');
        }
        cart[key].image = e.target.result;
        showToast(' Imagen agregada');
        selectCategory(activeCategoryId);
        updateCartUI();
      };
      reader.readAsDataURL(file);
    }

    function removeImage(key) {
      if (cart[key]) {
        cart[key].image = null;
        showToast(' Imagen eliminada');
        selectCategory(activeCategoryId);
        updateCartUI();
      }
    }

    function updateCartUI() {
      const totalItems = Object.values(cart).reduce((sum, i) => sum + i.qty, 0);
      const cartSection = document.getElementById('cart-section');
      const floatingBtn = document.getElementById('floating-cart-btn');
      const badge = document.getElementById('floating-badge');
      const cartItems = document.getElementById('cart-items');
      const cartEmpty = document.getElementById('cart-empty');
      const cartFooter = document.getElementById('cart-footer');
      const totalQtyEl = document.getElementById('cart-total-qty');

      if (totalItems > 0) {
        cartSection?.classList.remove('hidden');
        floatingBtn?.classList.remove('hidden');
        floatingBtn?.classList.add('flex');
        if (badge) badge.textContent = totalItems;
        cartEmpty?.classList.add('hidden');
        cartFooter?.classList.remove('hidden');
        if (totalQtyEl) totalQtyEl.textContent = totalItems + (totalItems === 1 ? ' producto' : ' productos');
      } else {
        cartSection?.classList.add('hidden');
        floatingBtn?.classList.add('hidden');
        floatingBtn?.classList.remove('flex');
        cartEmpty?.classList.remove('hidden');
        cartFooter?.classList.add('hidden');
      }

      if (cartItems) cartItems.innerHTML = '';
      Object.entries(cart).forEach(([key, item]) => {
        if (item.qty <= 0) return;

        const cat = CATEGORIES.find(c => c.id === key.split('|')[0]);
        let extrasText = '';
        if (item.extras.size > 0 && cat?.extras) {
          const names = cat.extras.filter(e => item.extras.has(e.id)).map(e => e.label);
          if (names.length) extrasText = `<span class="text-xs text-purple-400 block mt-0.5">+ ${names.join(', ')}</span>`;
        }

        let imagePreview = '';
        if (item.image) {
          imagePreview = `
            <div class="w-12 h-12 rounded-lg overflow-hidden flex-shrink-0 border border-purple-200">
              <img src="${item.image}" alt="Referencia" class="w-full h-full object-cover">
            </div>
          `;
        }

        const cartItem = document.createElement('div');
        cartItem.className = 'flex items-center justify-between bg-pink-50 rounded-xl p-3 gap-2';
        cartItem.innerHTML = `
          <div class="flex items-center gap-2 flex-1 min-w-0">
            ${imagePreview}
            <div class="flex-1 min-w-0">
              <p class="font-semibold text-gray-700 text-sm truncate">${item.productName}</p>
              <p class="text-xs text-gray-400">${item.catName} › ${item.subName}</p>
              ${extrasText}
              ${item.talle || item.color ? `
                <p class="text-xs text-purple-600 mt-0.5">
                  ${item.talle ? `Talle: <strong>${item.talle}</strong>` : ''}
                  ${item.talle && item.color ? ' • ' : ''}
                  ${item.color ? `Color: <strong>${(cat?.standardColors || cat?.ranglanColors || []).find(c => c.value === item.color)?.label || item.color}</strong>` : ''}
                </p>
              ` : ''}
              ${item.image ? '<p class="text-xs text-purple-500 mt-0.5"> Con referencia</p>' : ''}
            </div>
          </div>
          <div class="flex items-center gap-2 shrink-0">
            <span class="font-heading font-bold text-pink-600 text-lg">×${item.qty}</span>
            <button class="w-7 h-7 rounded-full bg-red-100 text-red-500 flex items-center justify-center hover:bg-red-200 transition-colors" data-remove-key="${key}">
              <i data-lucide="x" style="width:14px;height:14px;"></i>
            </button>
          </div>
        `;
        cartItems?.appendChild(cartItem);
      });

      // Total estimado
      let totalBlock = document.getElementById('cart-total-block');
      const total = calculateTotal();
      if (totalItems > 0) {
        if (!totalBlock) {
          totalBlock = document.createElement('div');
          totalBlock.id = 'cart-total-block';
          totalBlock.className = 'mt-6 pt-4 border-t-2 border-dashed border-pink-300 text-center';
          totalBlock.innerHTML = `
            <p class="font-heading text-lg font-bold text-gray-700 mb-2">Total estimado</p>
            <p id="cart-total-price" class="font-heading text-3xl font-extrabold text-pink-600 drop-shadow-sm">$${total.toLocaleString('es-AR')}</p>
            <p class="text-xs text-purple-500 mt-1">* Precio referencial – consultar por WhatsApp</p>
          `;
          const btn = document.getElementById('whatsapp-btn');
          if (btn && btn.parentElement) {
            btn.parentElement.insertBefore(totalBlock, btn);
          } else if (cartFooter) {
            cartFooter.appendChild(totalBlock);
          }
        } else {
          const priceEl = document.getElementById('cart-total-price');
          if (priceEl) priceEl.textContent = `$${total.toLocaleString('es-AR')}`;
        }
      } else if (totalBlock) {
        totalBlock.remove();
      }

      lucide.createIcons();
    }

    function removeFromCart(key) {
      const name = cart[key]?.productName || 'Producto';
      delete cart[key];
      document.querySelectorAll(`[data-qty-display="${key}"]`).forEach(d => d.textContent = '0');
      showToast(` ${name} eliminado`);
      updateCartUI();
    }

    // ==================== WHATSAPP ====================
    function sendWhatsApp() {
      const items = Object.entries(cart).filter(([,i]) => i.qty > 0);
      if (items.length === 0) return;

      let message = ' *STAMPYCAT - Solicitud de Presupuesto*\n\nHola! Me gustaría consultar por:\n\n';
      items.forEach(([key, item]) => {
        const cat = CATEGORIES.find(c => c.id === key.split('|')[0]);
        let extras = '';
        if (item.extras.size > 0 && cat?.extras) {
          const names = cat.extras.filter(e => item.extras.has(e.id)).map(e => e.label);
          if (names.length) extras = ` _(${names.join(', ')})_`;
        }
        const imageNote = item.image ? '  _[con referencia adjunta]_' : '';
        let detalles = '';
        if (item.talle || item.color) {
          detalles = ' (';
          if (item.talle) detalles += `Talle ${item.talle}`;
          if (item.talle && item.color) detalles += ' • ';
          if (item.color) {
            const colorObj = (cat?.standardColors || cat?.ranglanColors || []).find(c => c.value === item.color);
            detalles += `Color ${colorObj?.label || item.color}`;
          }
          detalles += ')';
        }

        message += `• *${item.productName}* × ${item.qty}${extras}${detalles}${imageNote}\n  _${item.catName} › ${item.subName}_\n\n`;
      });

      const total = calculateTotal();
      if (total > 0) message += `*Total estimado*: $${total.toLocaleString('es-AR')}\n\n`;
      message += '¡Gracias! ';

      const phone = '5491173617819';
      const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
      window.open(url, '_blank');
    }

    // ==================== TOAST ====================
    function showToast(msg) {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const toast = document.createElement('div');
      toast.className = 'toast-msg bg-gray-800 text-white px-4 py-2 rounded-xl shadow-lg text-sm font-medium';
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 2500);
    }

    // ==================== EVENT LISTENERS ====================
    document.addEventListener('click', e => {
      const qtyBtn = e.target.closest('[data-action]');
      if (qtyBtn) {
        const action = qtyBtn.dataset.action;
        const key = qtyBtn.dataset.key;
        const delta = action === 'inc' ? 1 : -1;
        const catId = qtyBtn.dataset.catId || key.split('|')[0];
        const subName = qtyBtn.dataset.subName || key.split('|')[1];
        const prodName = qtyBtn.dataset.prodName || key.split('|')[2];
        updateQty(key, delta, catId, subName, prodName);
        return;
      }

      const removeBtn = e.target.closest('[data-remove-key]');
      if (removeBtn) {
        removeFromCart(removeBtn.dataset.removeKey);
        return;
      }

      const removeImageBtn = e.target.closest('[data-remove-image]');
      if (removeImageBtn) {
        e.preventDefault();
        removeImage(removeImageBtn.dataset.removeImage);
        return;
      }

      if (e.target.closest('#back-btn')) {
        document.getElementById('products-section')?.classList.add('hidden');
        activeCategoryId = null;
        document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
        return;
      }

      if (e.target.closest('#whatsapp-btn')) {
        sendWhatsApp();
        return;
      }

      if (e.target.closest('#floating-cart-btn')) {
        document.getElementById('cart-section')?.scrollIntoView({ behavior: 'smooth' });
        return;
      }
    });

    document.addEventListener('change', e => {
      if (e.target.classList.contains('extras-check')) {
        const key = e.target.dataset.key;
        const extraId = e.target.dataset.extraId;
        if (!cart[key]) {
          const [catId, subName, prodName] = key.split('|');
          cart[key] = { qty: 1, extras: new Set(), image: null, catName: CATEGORIES.find(c => c.id === catId)?.name || '', subName, productName: prodName };
          document.querySelectorAll(`[data-qty-display="${key}"]`).forEach(d => d.textContent = '1');
        }
        toggleExtra(key, extraId);
      }

      if (e.target.classList.contains('image-input')) {
        const key = e.target.dataset.key;
        const file = e.target.files[0];
        handleImageUpload(key, file);
        e.target.value = '';
      }

      if (e.target.classList.contains('talle-select') || e.target.classList.contains('color-select')) {
        const key = e.target.dataset.key;
        const value = e.target.value;

        if (!cart[key]) {
          const [catId, subName, prodName] = key.split('|');
          cart[key] = { 
            qty: 1, 
            extras: new Set(), 
            image: null, 
            talle: '', 
            color: '', 
            catName: CATEGORIES.find(c => c.id === catId)?.name || '', 
            subName, 
            productName: prodName 
          };
          document.querySelectorAll(`[data-qty-display="${key}"]`).forEach(d => d.textContent = '1');
        }

        if (e.target.classList.contains('talle-select')) {
          cart[key].talle = value;
        } else if (e.target.classList.contains('color-select')) {
          cart[key].color = value;
        }

        updateCartUI();
      }
    });

    // ==================== INICIO ====================
    document.addEventListener('DOMContentLoaded', () => {
      console.log('Página lista → mostrando categorías');
      renderCategories();
      lucide.createIcons();
      loadPrices();
    });
  </script>
</body>
</html>
