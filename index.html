<!doctype html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STAMPYCAT - Calculadora de Precios</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    * { box-sizing: border-box; }

    .font-heading { font-family: 'Baloo 2', cursive; }
    .font-body { font-family: 'Quicksand', sans-serif; }

    .comic-bg {
      background-color: #fef9f0;
      background-image:
        radial-gradient(circle, #f0c6d8 1px, transparent 1px),
        radial-gradient(circle, #c4a8e0 0.8px, transparent 0.8px);
      background-size: 28px 28px, 42px 42px;
      background-position: 0 0, 14px 14px;
    }

    .comic-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: radial-gradient(circle, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 4px 4px;
      pointer-events: none;
      z-index: 0;
    }

    .cat-paw { display: inline-block; transition: transform 0.2s; }
    .cat-paw:hover { transform: scale(1.2) rotate(-10deg); }

    .category-btn {
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      border: 3px solid transparent;
      position: relative;
      overflow: hidden;
    }
    .category-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    .category-btn:hover::before { left: 100%; }
    .category-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }
    .category-btn.active {
      border-color: #e84393;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(232,67,147,0.3);
    }

    .product-card {
      transition: all 0.2s ease;
      border: 2px solid #f0e6f6;
    }
    .product-card:hover {
      border-color: #d63384;
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(214,51,132,0.15);
    }

    .qty-btn { transition: all 0.15s ease; }
    .qty-btn:hover { transform: scale(1.1); }
    .qty-btn:active { transform: scale(0.95); }

    .cart-badge {
      animation: popIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    @keyframes popIn {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }

    .slide-down { animation: slideDown 0.35s ease-out; }
    @keyframes slideDown {
      0% { opacity: 0; transform: translateY(-15px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .whatsapp-btn {
      background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(37,211,102,0.4);
    }
    .whatsapp-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(37,211,102,0.5);
    }

    .stamp-border { border: 3px dashed #e84393; border-radius: 12px; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #fef9f0; }
    ::-webkit-scrollbar-thumb { background: #d4a5c9; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #c084b6; }

    .extras-check { accent-color: #e84393; }

    .floating-cart {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 50;
      transition: all 0.3s ease;
    }
    .floating-cart:hover { transform: scale(1.05); }

    .toast-msg {
      animation: toastIn 0.4s ease-out, toastOut 0.3s ease-in 2s forwards;
    }
    @keyframes toastIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastOut {
      0% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-10px); }
    }

    .subcategory-header::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 40px;
      height: 3px;
      background: linear-gradient(90deg, #e84393, #a855f7);
      border-radius: 2px;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>
<body class="h-full font-body">

          </a>
        </div>
      </div>
    </header>

    <!-- Main content -->
    <main class="relative z-10 max-w-6xl mx-auto px-4 py-6">
      <section aria-label="Categorías de productos">
        <h2 class="font-heading text-xl md:text-2xl font-bold text-gray-700 mb-4 flex items-center gap-2">
          <span class="cat-paw">🐾</span> Elegí una categoría
        </h2>
        <div id="category-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 mb-6">
          <!-- Las categorías se insertan aquí con JavaScript -->
        </div>
      </section>

      <section id="products-section" class="hidden fade-in" aria-label="Productos">
        <div class="bg-white/95 rounded-2xl shadow-xl p-4 md:p-6 mb-6">
          <div class="flex items-center justify-between mb-4">
            <h2 id="category-title" class="font-heading text-xl md:text-2xl font-bold text-pink-600 flex items-center gap-2"></h2>
            <button id="back-btn" class="flex items-center gap-1 text-sm text-purple-500 hover:text-purple-700 font-semibold transition-colors" aria-label="Volver a categorías">
              <i data-lucide="arrow-left" style="width:18px;height:18px;"></i> Volver
            </button>
          </div>
          <div id="products-container">
            <!-- Subcategorías y productos se insertan aquí -->
          </div>
        </div>
      </section>

      <section id="cart-section" class="hidden fade-in mb-24" aria-label="Resumen del pedido">
        <div class="bg-white/95 rounded-2xl shadow-xl p-4 md:p-6 stamp-border">
          <h2 class="font-heading text-xl md:text-2xl font-bold text-purple-600 mb-4 flex items-center gap-2">
            <i data-lucide="shopping-cart" style="width:24px;height:24px;"></i> Tu Pedido
          </h2>
          <div id="cart-items" class="space-y-3 mb-4"></div>
          <div id="cart-empty" class="text-center py-8 text-gray-400">
            <span class="text-4xl">🛒</span>
            <p class="mt-2 font-medium">Tu carrito está vacío</p>
            <p class="text-sm">Agregá productos para armar tu pedido</p>
          </div>
          <div id="cart-footer" class="hidden border-t-2 border-dashed border-pink-200 pt-4 mt-4">
            <div class="flex justify-between items-center mb-4">
              <span class="font-heading text-lg font-bold text-gray-700">Total de productos:</span>
              <span id="cart-total-qty" class="font-heading text-2xl font-extrabold text-pink-600">0</span>
            </div>
            <button id="whatsapp-btn" class="whatsapp-btn w-full text-white font-heading font-bold text-lg py-4 rounded-xl flex items-center justify-center gap-3">

              </svg>
              <span id="whatsapp-btn-text">Solicitar Presupuesto</span>
            </button>
          </div>
        </div>
      </section>
    </main>

    <!-- Floating cart button -->
    <button id="floating-cart-btn" class="floating-cart hidden bg-gradient-to-br from-pink-500 to-purple-600 text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center" aria-label="Ver carrito">
      <i data-lucide="shopping-cart" style="width:28px;height:28px;"></i>
      <span id="floating-badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs font-bold w-6 h-6 rounded-full flex items-center justify-center cart-badge">0</span>
    </button>

    <!-- Footer -->
    <footer class="relative z-10 bg-white/90 border-t-2 border-pink-200 py-4 text-center">
      <p class="text-sm text-purple-400 font-medium">
        🐱 STAMPYCAT Argentina · 
        <a href="https://instagram.com/stampycatargentina" target="_blank" rel="noopener noreferrer" class="text-pink-500 hover:underline">@stampycatargentina</a>
      </p>
    </footer>
  </div>

  <!-- ================================================ -->
  <!--               JAVASCRIPT - AL FINAL             -->
  <!-- ================================================ -->
  <script>
    // ==================== DATA ====================
    const CATEGORIES = [
      { id: 'tazas-mates', name: 'Tazas y Mates', icon: '☕', gradient: 'from-pink-400 to-rose-500',
        subcategories: [
          { name: 'Tazas', products: ['Taza de polímero','Taza de cerámica','Taza de cerámica mágica','Taza mágica glitter','Vaso polímero tipo Starbucks'] },
          { name: 'Mates', products: ['Mate de polímero','Set matero (Yerbero, azucarero y mate)','Set completo con termo','Termo','Matelisto'] }
        ]
      },
      { id: 'botellas-jarros', name: 'Botellas y Jarros', icon: '🍶', gradient: 'from-blue-400 to-cyan-500',
        subcategories: [
          { name: 'Botellas', products: ['Botella hoppy','Botella Hoppy con aluminio','Termo estilo lata'] },
          { name: 'Jarros', products: ['Jarro chopp polímero','Jarra chopp cervecero','Jarro térmico con tapa','Jarro tipo Cantimplora'] }
        ]
      },
      { id: 'remeras', name: 'Remeras', icon: '👕', gradient: 'from-purple-400 to-violet-500',
        extras: [{ id: 'extra-estampado', label: 'Estampado adicional (espalda/manga/frente) — solo algodón', perProduct: true }],
        subcategories: [
          { name: 'Remeras Niños', products: ['Remera algodón','Remera poliéster','Remera ranglan'] },
          { name: 'Remeras Adultos', products: ['Remera algodón','Remera poliéster','Remera ranglan'] }
        ]
      },
      { id: 'buzos-camperas', name: 'Buzos y Camperas', icon: '🧥', gradient: 'from-emerald-400 to-teal-500',
        subcategories: [
          { name: 'Niños', products: ['Buzo canguro','Buzo cuello redondo'] },
          { name: 'Adultos', products: ['Buzo canguro','Buzo cuello redondo'] }
        ]
      },
      { id: 'escolar-futbol', name: 'Escolar y Fútbol', icon: '⚽', gradient: 'from-amber-400 to-orange-500',
        subcategories: [
          { name: 'Babys', products: ['Body bebé','Body bebé con caja sorpresa'] },
          { name: 'Escolar', products: ['Set de jardín','Funda carpeta N°3','Regla de madera','Bandas de jura','Señalador de libros'] },
          { name: 'Fútbol', products: ['Canilleras','Medias canilleras','Banderín'] }
        ]
      },
      { id: 'accesorios', name: 'Accesorios', icon: '🎁', gradient: 'from-pink-400 to-fuchsia-500',
        subcategories: [
          { name: 'Madera', products: ['Portaretratos "Feliz Día"','Portaretratos "Tú & Yo"','Portallaves pared','Portacelular','Destapador pared','Estuche cerveza regalo','Servilletero','Set parrillero con plato'] },
          { name: 'Otros', products: ['Gorras','Llavero destapador','Llaveros camiseta','Llaveros clásicos','Portavasos de tela','Individual de mesa de tela','Mousepad circular','Mousepad rectangular','Almohadas con relleno','Duo taza + almohadón'] }
        ]
      },
      { id: 'fechas-especiales', name: 'Fechas Especiales', icon: '🎉', gradient: 'from-red-400 to-pink-500',
        subcategories: [
          { name: 'Día del Padre', products: ['Taza personalizada','Set asado + chopp cervecero'] },
          { name: 'Día de la Bandera', products: ['Banda para Jura','Pin','Certificado de Jura a la bandera'] },
          { name: 'Semana de la Dulzura', products: ['Taza temática Dulzura y golosinas'] },
          { name: 'Egresaditos', products: ['Pack egresaditos','Gorras','Remera de egresados','Souvenir personalizado (a consultar)'] },
          { name: 'Día del Amigo', products: ['Taza temática día del amigo'] }
        ]
      },
      { id: 'papeleria', name: 'Papelería Creativa', icon: '✨', gradient: 'from-violet-400 to-purple-600',
        extras: [{ id: 'extra-imantado', label: 'Producto imantado', perProduct: true }],
        subcategories: [
          { name: 'Stickers', products: ['Stickers clásicos','Stickers emprendimiento','Stickers holográficos','Stickers holográficos transparentes','Stickers sublimados en vinilo'] },
          { name: 'Fotos Polaroid', products: ['Fotos polaroid x5','Fotos polaroid x10','Fotos polaroid x15','Tira Fotocabina de 3 x5','Tira Fotocabina de 3 x10','Tira Fotocabina de 3 x15'] },
          { name: 'Cumpleañitos', products: ['Caketopper clásico','Caketopper 3D','Banderín personalizado','Invitación digital para eventos','Invitación tarjeta física para eventos'] }
        ]
      }
    ];

    // ==================== STATE ====================
    let cart = {};
    let activeCategoryId = null;
    let prices = {};

    // ==================== CONFIG ====================
    const defaultConfig = {
      brand_title: 'STAMPYCAT',
      brand_subtitle: 'Sublimación • Estampados • Papelería Creativa',
      whatsapp_button_text: 'Solicitar Presupuesto',
      background_color: '#fef9f0',
      surface_color: '#ffffff',
      text_color: '#4a3560',
      primary_action_color: '#e84393',
      secondary_action_color: '#a855f7'
    };

    function applyConfig(config) {
      const title = config.brand_title || defaultConfig.brand_title;
      const subtitle = config.brand_subtitle || defaultConfig.brand_subtitle;
      const btnText = config.whatsapp_button_text || defaultConfig.whatsapp_button_text;
      const bgColor = config.background_color || defaultConfig.background_color;
      const surfColor = config.surface_color || defaultConfig.surface_color;
      const txtColor = config.text_color || defaultConfig.text_color;
      const primaryColor = config.primary_action_color || defaultConfig.primary_action_color;
      const secondaryColor = config.secondary_action_color || defaultConfig.secondary_action_color;
      const fontFamily = config.font_family || "'Baloo 2', cursive";
      const fontSize = config.font_size || 16;

      document.getElementById('brand-title').textContent = title;
      document.getElementById('brand-subtitle').textContent = subtitle;
      document.getElementById('whatsapp-btn-text').textContent = btnText;

      const wrapper = document.getElementById('app-wrapper');
      wrapper.style.backgroundColor = bgColor;

      document.querySelectorAll('.bg-white\\/95, .bg-white\\/90').forEach(el => {
        el.style.backgroundColor = surfColor + 'f2';
      });

      const headingFont = `${fontFamily}, 'Baloo 2', cursive`;
      const bodyFont = `${fontFamily}, 'Quicksand', sans-serif`;
      document.querySelectorAll('.font-heading').forEach(el => el.style.fontFamily = headingFont);
      document.querySelectorAll('.font-body, body').forEach(el => el.style.fontFamily = bodyFont);

      const base = fontSize;
      document.querySelectorAll('h1').forEach(el => el.style.fontSize = `${base * 1.8}px`);
      document.querySelectorAll('h2').forEach(el => el.style.fontSize = `${base * 1.4}px`);
      document.querySelectorAll('h3').forEach(el => el.style.fontSize = `${base * 1.15}px`);
      document.querySelectorAll('p, span, button, label, a').forEach(el => {
        if (!el.closest('h1') && !el.closest('h2') && !el.closest('h3')) {
          el.style.fontSize = `${base}px`;
        }
      });
    }

    // ==================== ELEMENT SDK ====================
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => { applyConfig(config); },
        mapToCapabilities: (config) => ({
          recolorables: [
            { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
            { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
            { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
            { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
            { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
          ],
          borderables: [],
          fontEditable: {
            get: () => config.font_family || "'Baloo 2'",
            set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
          },
          fontSizeable: {
            get: () => config.font_size || 16,
            set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
          }
        }),
        mapToEditPanelValues: (config) => new Map([
          ['brand_title', config.brand_title || defaultConfig.brand_title],
          ['brand_subtitle', config.brand_subtitle || defaultConfig.brand_subtitle],
          ['whatsapp_button_text', config.whatsapp_button_text || defaultConfig.whatsapp_button_text]
        ])
      });
    }

    // ==================== CARGAR PRECIOS ====================
    async function loadPrices() {
      try {
        const response = await fetch('./precios.json');
        if (!response.ok) throw new Error('No se pudo cargar precios.json');
        prices = await response.json();
        console.log('Precios cargados OK');
      } catch (err) {
        console.warn('No se cargaron precios:', err.message);
        showToast('⚠️ No se encontraron precios (usa $0 por ahora)');
      }
    }

    // ==================== CALCULAR TOTAL ====================
    function calculateTotal() {
      let total = 0;
      Object.entries(cart).forEach(([key, item]) => {
        if (item.qty <= 0) return;
        const [catId, subName, prodName] = key.split('|');
        const basePrice = prices?.[catId]?.[subName]?.[prodName] || 0;
        let extraCost = 0;
        if (item.extras.has('extra-estampado')) extraCost += 3000;
        if (item.extras.has('extra-imantado')) extraCost += 800;
        total += (basePrice + extraCost) * item.qty;
      });
      return total;
    }

    // ==================== RENDER CATEGORIES ====================
    function renderCategories() {
      const grid = document.getElementById('category-grid');
      if (!grid) {
        console.error('No se encontró #category-grid');
        return;
      }
      grid.innerHTML = '';
      CATEGORIES.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `category-btn bg-gradient-to-br ${cat.gradient} text-white rounded-2xl p-4 md:p-5 flex flex-col items-center gap-2 shadow-lg`;
        btn.dataset.catId = cat.id;
        btn.innerHTML = `
          <span class="text-3xl md:text-4xl">${cat.icon}</span>
          <span class="font-heading font-bold text-sm md:text-base text-center leading-tight">${cat.name}</span>
        `;
        btn.addEventListener('click', () => selectCategory(cat.id));
        grid.appendChild(btn);
      });
    }

    // ... (todas las demás funciones siguen iguales: selectCategory, updateQty, toggleExtra, etc.)

    // Para no hacer el mensaje eterno, copio solo las partes clave del init.
    // El resto del código (selectCategory, updateQty, toggleExtra, handleImageUpload, removeImage, updateCartUI, removeFromCart, sendWhatsApp, showToast, event listeners) debe permanecer exactamente igual al que tenías.

    // ==================== INICIALIZACIÓN ====================
    document.addEventListener('DOMContentLoaded', () => {
      console.log('Página cargada → pintando categorías');
      renderCategories();
      lucide.createIcons();
      loadPrices();  // no bloquea la vista
    });
  </script>
</body>
</html>
